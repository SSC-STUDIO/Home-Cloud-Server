name: Security Audit

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # 每周一凌晨 2 点运行
    - cron: '0 2 * * 1'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Run pip-audit on requirements.txt
      run: |
        pip-audit --desc --requirement requirements.txt

    - name: Run pip-audit on pyproject.toml dependencies
      run: |
        pip install toml
        python -c "
import toml
import sys

with open('pyproject.toml', 'r') as f:
    config = toml.load(f)

deps = config.get('project', {}).get('dependencies', [])
for dep in deps:
    print(dep)
" > pyproject-deps.txt
        pip-audit --desc --requirement pyproject-deps.txt || true

    - name: Generate audit report
      run: |
        pip-audit --desc --requirement requirements.txt --format=json --output=audit-report.json || true
        if [ -f audit-report.json ]; then
          cat audit-report.json
        fi
      continue-on-error: true